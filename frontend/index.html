const TACTICS_ORDER = ['initial_access','execution','persistence','privilege_escalation','defense_evasion','credential_access','lateral_movement','command_and_control','exfiltration','impact'];

function computeSummary(techs) {
  const c = {BUILT:0,PARTIAL:0,BROKEN:0,GAP:0}; let illusion=0;
  techs.forEach(t=>{c[t.coverage_state]++;if(t.coverage_illusion)illusion++;});
  const total=techs.length||1;
  const real=(c.BUILT+c.PARTIAL*0.5)/total*100;
  const apparent=(c.BUILT+c.PARTIAL*0.5+c.BROKEN*0.5)/total*100;
  return{...c,total,illusion_count:illusion,real_coverage_pct:real.toFixed(1),apparent_coverage_pct:apparent.toFixed(1),illusion_gap_pct:(apparent-real).toFixed(1)};
}
const sevColor=s=>({critical:'var(--critical)',high:'var(--high)',medium:'var(--medium)',low:'var(--muted)'}[s]||'var(--muted)');

function Badge({type,children}){return <span className={`badge badge-${type}`}>{children}</span>;}
function StateBadge({state,illusion}){
  if(illusion)return <span className="badge badge-illusion">⚠ Illusion</span>;
  const t={BUILT:'built',PARTIAL:'partial',BROKEN:'broken',GAP:'gap'};
  return <Badge type={t[state]||'gap'}>{state}</Badge>;
}
function SevBadge({severity}){return <Badge type={severity}>{severity}</Badge>;}
function ProgressBar({value,color='var(--accent)',height=4}){
  return <div className="progress-bar" style={{height}}><div className="progress-fill" style={{width:`${Math.min(value,100)}%`,background:color,height}}/></div>;
}
function Spinner(){return <div className="spinner"/>;}

function CoverageDonut({summary}){
  const size=120,cx=60,cy=60,r=46,circ=2*Math.PI*r;
  const segs=[{k:'BUILT',c:'var(--built)',n:summary.BUILT},{k:'PARTIAL',c:'var(--partial)',n:summary.PARTIAL},{k:'BROKEN',c:'var(--broken)',n:summary.BROKEN},{k:'GAP',c:'var(--dim)',n:summary.GAP}];
  let off=0;
  const arcs=segs.map(s=>{const pct=s.n/summary.total,d=pct*circ,a={...s,d,g:circ-d,off};off+=d;return a;});
  return(
    <div style={{position:'relative',width:size,height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        {arcs.map(a=><circle key={a.k} cx={cx} cy={cy} r={r} fill="none" stroke={a.c} strokeWidth={14} strokeDasharray={`${a.d} ${a.g}`} strokeDashoffset={-a.off}/>)}
      </svg>
      <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center'}}>
        <div style={{fontFamily:'var(--font-mono)',fontSize:22,fontWeight:600,color:'#fff',lineHeight:1}}>{summary.real_coverage_pct}%</div>
        <div style={{fontSize:8,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1,marginTop:2}}>Real</div>
      </div>
    </div>
  );
}

function useApiStatus(){
  const [status,setStatus]=useState('loading');
  useEffect(()=>{
    api.get('/health')
      .then(()=>setStatus('online'))
      .catch(()=>setStatus('offline'));
  },[]);
  return status;
}

function useClientData(clientId){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [source,setSource]=useState('mock');

  useEffect(()=>{
    if(!clientId)return;
    setLoading(true);
    const load=async()=>{
      try{
        const [techs,gaps,recs]=await Promise.all([
          api.get(`/api/coverage/matrix?client_id=${clientId}`),
          api.get(`/api/gaps?client_id=${clientId}`),
          api.get(`/api/recommendations?client_id=${clientId}`),
        ]);
        // Only use API data if we actually got results
        if(techs && techs.length > 0) {
          const mappedTechs = techs.map(t=>({
            ...t, severity: t.priority_score>=85?'critical':t.priority_score>=70?'high':'medium'
          }));
          setData({
            techniques: mappedTechs,
            gaps: (gaps && gaps.length > 0) ? gaps : (MOCK.gaps[clientId] || []),
            recommendations: (recs && recs.length > 0) ? recs : (MOCK.recommendations[clientId] || []),
          });
          setSource('api');
        } else {
          // API returned empty - use mock
          setData({
            techniques: MOCK.techniques[clientId]||[],
            gaps: MOCK.gaps[clientId]||[],
            recommendations: MOCK.recommendations[clientId]||[],
          });
          setSource('mock');
        }
      }catch(e){
        setData({
          techniques: MOCK.techniques[clientId]||[],
          gaps: MOCK.gaps[clientId]||[],
          recommendations: MOCK.recommendations[clientId]||[],
        });
        setSource('mock');
      }finally{
        setLoading(false);
      }
    };
    load();
  },[clientId]);

  return {data,loading,source};
}

function GapExplorer({clientId}){
  const {data,loading}=useClientData(clientId);
  const [expanded,setExpanded]=useState(null);
  const [sevFilter,setSevFilter]=useState('ALL');
  const [typeFilter,setTypeFilter]=useState('ALL');
  if(loading)return <div className="page-body flex items-center gap-12" style={{paddingTop:60,justifyContent:'center'}}><Spinner/></div>;
  const gaps=data?.gaps||[];
  const filtered=gaps.filter(g=>{
    if(sevFilter!=='ALL'&&g.severity!==sevFilter)return false;
    if(typeFilter==='ILLUSION'&&!g.coverage_illusion)return false;
    if(typeFilter==='DETECTION'&&g.gap_type!=='detection_gap'&&g.gap_type!=='broken_rule')return false;
    if(typeFilter==='VISIBILITY'&&g.gap_type!=='visibility_gap')return false;
    return true;
  });
  return(
    <div>
      <div className="page-header">
        <div><div className="page-title">GAP EXPLORER</div><div className="page-subtitle">Detection Gaps — Visibility Gaps — Coverage Illusions</div></div>
      </div>
      <div className="page-body">
        <div className="metrics-grid-3 mb-16">
          <div className="metric-card accent-illusion"><div className="metric-value" style={{color:'var(--illusion)'}}>{gaps.filter(g=>g.coverage_illusion).length}</div><div className="metric-label">Coverage Illusions</div><div className="metric-delta">Rules deployed but broken</div></div>
          <div className="metric-card accent-broken"><div className="metric-value" style={{color:'var(--broken)'}}>{gaps.filter(g=>g.gap_type==='broken_rule'||g.gap_type==='detection_gap').length}</div><div className="metric-label">Detection Gaps</div><div className="metric-delta">Missing / broken rules</div></div>
          <div className="metric-card accent-blue"><div className="metric-value" style={{color:'var(--accent)'}}>{gaps.filter(g=>g.gap_type==='visibility_gap').length}</div><div className="metric-label">Visibility Gaps</div><div className="metric-delta">Missing log sources</div></div>
        </div>
        <div className="filter-row mb-12">
          <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>SEV:</span>
          {['ALL','critical','high','medium'].map(f=><button key={f} className={`filter-chip ${sevFilter===f?'active':''}`} onClick={()=>setSevFilter(f)}>{f}</button>)}
          <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--font-mono)',marginLeft:8}}>TYPE:</span>
          {['ALL','ILLUSION','DETECTION','VISIBILITY'].map(f=><button key={f} className={`filter-chip ${typeFilter===f?'active':''}`} onClick={()=>setTypeFilter(f)}>{f}</button>)}
        </div>
        {filtered.map(g=>{
          const isExp=expanded===g.id;
          const cls=g.coverage_illusion?'illusion':g.coverage_state==='BROKEN'?'broken':g.coverage_state==='GAP'?'gap':'partial';
          return(
            <div key={g.id||g.technique_id} className={`gap-card ${cls}`}>
              <div className="gap-header" onClick={()=>setExpanded(isExp?null:g.id)}>
                <div style={{flex:1}}>
                  <div className="flex items-center gap-8 mb-4">
                    <span className="text-mono" style={{fontSize:12,color:'var(--accent)',fontWeight:600}}>{g.technique_id}</span>
                    <StateBadge state={g.coverage_state} illusion={g.coverage_illusion}/>
                    <SevBadge severity={g.severity}/>
                    <span className="badge badge-blue">{(g.gap_type||'').replace(/_/g,' ')}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{g.technique_name} — {(g.tactic||'').replace(/_/g,' ')}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>{g.description}</div>
                </div>
                <div className="flex items-center gap-12">
                  <div style={{textAlign:'right'}}>
                    <div style={{fontFamily:'var(--font-mono)',fontSize:18,color:sevColor(g.severity),lineHeight:1}}>{g.priority_score}</div>
                    <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:1}}>Priority</div>
                  </div>
                  <span style={{color:'var(--muted)',fontSize:14,transform:isExp?'rotate(90deg)':'rotate(0deg)',transition:'transform .2s',display:'inline-block'}}>▶</span>
                </div>
              </div>
              {isExp&&(
                <div className="gap-body">
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:10}}>
                    <div>
                      <div className="section-title">Affected Rules</div>
                      {(g.affected_rules||[]).length>0?(g.affected_rules||[]).map(r=>(
                        <div key={r} className="flex items-center gap-6 mb-4">
                          <span style={{width:6,height:6,borderRadius:'50%',background:'var(--broken)',display:'inline-block',flexShrink:0}}/>
                          <span className="text-mono" style={{fontSize:10}}>{r}</span>
                        </div>
                      )):<span style={{fontSize:11,color:'var(--muted)'}}>No rules deployed</span>}
                    </div>
                    <div>
                      <div className="section-title">Missing Sources</div>
                      {(g.missing_sources||[]).map(s=>(
                        <div key={s} className="flex items-center gap-6 mb-4">
                          <span style={{width:6,height:6,borderRadius:0,background:'var(--broken)',display:'inline-block',flexShrink:0}}/>
                          <span className="text-mono" style={{fontSize:10,color:'var(--partial)'}}>{s}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {g.attacker_path&&<div className="reasoning-block"><div className="reasoning-label">⬡ Attacker Path</div><div className="reasoning-text">{g.attacker_path}</div></div>}
                  {g.detection_failure&&<div className="reasoning-block" style={{marginTop:8}}><div className="reasoning-label" style={{color:'var(--broken)'}}>✕ Why Detection Fails</div><div className="reasoning-text">{g.detection_failure}</div></div>}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:8}}>
                    {g.estimated_dwell_time&&<div className="reasoning-block"><div className="reasoning-label" style={{color:'var(--partial)'}}>⏱ Dwell Time</div><div className="reasoning-text" style={{fontSize:11}}>{g.estimated_dwell_time}</div></div>}
                    {g.business_impact&&<div className="reasoning-block"><div className="reasoning-label" style={{color:'var(--high)'}}>💥 Business Impact</div><div className="reasoning-text" style={{fontSize:11}}>{g.business_impact}</div></div>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'48px',color:'var(--muted)',fontFamily:'var(--font-mono)'}}>NO GAPS MATCHING CURRENT FILTERS</div>}
      </div>
    </div>
  );
}

function HITLQueue({clientId}){
  const [decisions,setDecisions]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    api.get(`/api/decisions?client_id=${clientId}&pending_only=false`)
      .then(d=>setDecisions(d))
      .catch(()=>setDecisions([
        {id:'d001',client_id:clientId,entity_type:'recommendation',title:'Approve: Ingest Network Flow',description:'network_flow resolves 7 rules across 6 critical techniques. Est. cost $4,320/month.',priority:10,action:null},
        {id:'d002',client_id:clientId,entity_type:'gap',title:'Review: LSASS Coverage Illusion — Critical',description:'process_access source is offline. LSASS credential dumping undetectable despite rules deployed.',priority:5,action:null},
        {id:'d003',client_id:clientId,entity_type:'recommendation',title:'Approve: PowerShell Script Block Logging',description:'$315/month closes T1059.001 coverage illusion. Highest ROI recommendation.',priority:15,action:null},
      ]))
      .finally(()=>setLoading(false));
  },[clientId]);

  const submit=async(id,action)=>{
    try{await api.post(`/api/decisions/${id}`,{action,decided_by:'analyst@umbra-demo'});}catch(e){}
    setDecisions(p=>p.map(d=>d.id===id?{...d,action}:d));
  };

  const pending=(decisions||[]).filter(d=>!d.action);
  const resolved=(decisions||[]).filter(d=>d.action);
  return(
    <div>
      <div className="page-header">
        <div><div className="page-title">HITL DECISION QUEUE</div><div className="page-subtitle">Human-in-the-Loop — Approval, Rejection, Deferral, Escalation</div></div>
        <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--muted)'}}>{pending.length} PENDING</span>
      </div>
      <div className="page-body">
        {loading&&<div className="flex items-center gap-12" style={{padding:'40px 0',justifyContent:'center'}}><Spinner/></div>}
        {!loading&&pending.length===0&&resolved.length===0&&<div style={{textAlign:'center',padding:'48px',color:'var(--muted)',fontFamily:'var(--font-mono)'}}>NO DECISIONS FOR THIS CLIENT</div>}
        {pending.map(d=>(
          <div key={d.id} className="hitl-card">
            <div className="flex items-start gap-12">
              <div style={{width:3,background:d.priority<=10?'var(--critical)':d.priority<=20?'var(--high)':'var(--medium)',borderRadius:2,alignSelf:'stretch',minHeight:40}}/>
              <div style={{flex:1}}>
                <div className="flex items-center gap-8 mb-4">
                  <Badge type={d.entity_type==='gap'?'broken':'blue'}>{d.entity_type}</Badge>
                  <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'#fff',fontWeight:600}}>{d.title}</span>
                </div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{d.description}</div>
              </div>
              <div className="flex gap-8">
                <button className="btn btn-approve btn-sm" onClick={()=>submit(d.id,'approved')}>✓ APPROVE</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>submit(d.id,'deferred')}>DEFER</button>
                <button className="btn btn-danger btn-sm" onClick={()=>submit(d.id,'rejected')}>✕ REJECT</button>
              </div>
            </div>
          </div>
        ))}
        {resolved.length>0&&<>
          <div className="section-title mt-20">Resolved</div>
          {resolved.map(d=>(
            <div key={d.id} className="hitl-card" style={{opacity:.5}}>
              <div className="flex items-center gap-12">
                <div style={{width:3,background:'var(--built)',borderRadius:2,minHeight:32,alignSelf:'stretch'}}/>
                <div style={{flex:1}}><div className="flex items-center gap-8"><Badge type={d.action==='approved'?'built':d.action==='rejected'?'broken':'partial'}>{d.action}</Badge><span style={{fontSize:12}}>{d.title}</span></div></div>
              </div>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
}

          <div style={{fontSize:9,color:'var(--dim)',fontFamily:'var(--font-mono)',letterSpacing:1}}>
            UMBRA v1.0.0<br/>MDR PLATFORM<br/>
            <span style={{color:apiStatus==='online'?'var(--built)':apiStatus==='loading'?'var(--partial)':'var(--muted)'}}>{apiStatus==='online'?'● API CONNECTED':apiStatus==='loading'?'○ CONNECTING...':'○ DEMO MODE'}</span>
          </div>
        </div>
      </div>
      <div className="main">{renderPage()}</div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
